name: CI Scan

on:
  pull_request:

permissions:
  contents: read

jobs:
  phpstan:
    name: PHPStan Level 9
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: fileinfo, mbstring, pdo_mysql
          coverage: none

      - name: Download PHPStan
        run: curl -LsS https://github.com/phpstan/phpstan/releases/latest/download/phpstan.phar -o /tmp/phpstan.phar

      - name: Run PHPStan level 9
        run: php /tmp/phpstan.phar analyse --level=9 --no-progress .
